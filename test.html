<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unikō Test Grid - 20 NFTs</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #B29AE1, #F8BEF1, #FDAFAE, #F8CC1F, #B9E99C, #99E1FF);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease-in-out infinite;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .nft-card {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 2px solid #444;
        }
        .nft-card.ultra-rare {
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .nft-card.rainbow {
            border-color: #FF69B4;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
        }
        .nft-svg {
            width: 150px;
            height: 150px;
            margin: 0 auto 10px;
            border-radius: 8px;
        }
        .nft-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .nft-type {
            font-size: 12px;
            opacity: 0.7;
        }
        .section-title {
            font-size: 24px;
            margin: 30px 0 15px;
            text-align: center;
            color: #FFD700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Unikō Test Collection</h1>
        
        <div class="section-title">🎭 Ultra Rares (10/10)</div>
        <div class="grid" id="ultra-rares"></div>
        
        <div class="section-title">🌈 Rainbow Backgrounds (5)</div>
        <div class="grid" id="rainbow-nfts"></div>
        
        <div class="section-title">🎲 Random Regular (5)</div>
        <div class="grid" id="random-nfts"></div>
    </div>

    <script>
        // Ultra Rare Definitions (All 10)
        const ultraRares = [
            {
                name: "nounish",
                svg: `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150">
                    <rect width="100%" height="100%" fill="#FFFFFF"/>
                    <text y="50%" font-size="16" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI" fill="#EA434A">
                        <tspan x="43%">⌐</tspan><tspan x="50%">◨</tspan><tspan x="57%">-</tspan><tspan x="64%">◨</tspan>
                    </text></svg>`
            },
            {
                name: "pika",
                svg: `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150">
                    <rect width="100%" height="100%" fill="#F9CC1F"/>
                    <text y="50%" font-size="16" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI">
                        <tspan x="35%" fill="#EA434A">⬤</tspan>
                        <tspan x="43%" fill="#000000">-</tspan>
                        <tspan x="50%" fill="#000000">⩊</tspan>
                        <tspan x="57%" fill="#000000">-</tspan>
                        <tspan x="65%" fill="#EA434A">⬤</tspan>
                    </text></svg>`
            },
            {
                name: "3Dglasses",
                svg: `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150">
                    <rect width="100%" height="100%" fill="#8C8C8C"/>
                    <text y="50%" font-size="16" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI" fill="#FFFFFF">
                        <tspan x="43%">⌐</tspan>
                        <tspan x="50%" fill="#1625FF">■</tspan>
                        <tspan x="57%" fill="#FFFFFF">-</tspan>
                        <tspan x="64%" fill="#EA434A">■</tspan>
                    </text></svg>`
            },
            {
                name: "pepe",
                svg: `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150">
                    <rect width="100%" height="100%" fill="#577D29"/>
                    <text y="50%" font-size="16" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI">
                        <tspan x="33%" fill="#1625FF">∙</tspan>
                        <tspan x="43%" fill="#000000">◒</tspan>
                        <tspan x="50%" fill="#EA434A">ᴗ</tspan>
                        <tspan x="57%" fill="#000000">◒</tspan>
                        <tspan x="67%" fill="#1625FF">∙</tspan>
                    </text></svg>`
            },
            {
                name: "imagine",
                svg: `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150">
                    <defs>
                        <linearGradient id="imagineGradient" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#FFFFFF"/>
                            <stop offset="100%" stop-color="#88EDFF"/>
                        </linearGradient>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#imagineGradient)"/>
                    <text y="50%" font-size="16" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI">
                        <tspan x="37%" fill="#000000">⌐</tspan>
                        <tspan x="45%" fill="#FFFFFF">O</tspan>
                        <tspan x="52%" fill="#000000">-</tspan>
                        <tspan x="58%" fill="#FFFFFF">O</tspan>
                        <tspan x="65%" fill="#FFFFFF">✿</tspan>
                    </text></svg>`
            },
            {
                name: "duo",
                svg: `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150">
                    <rect width="100%" height="100%" fill="#FFFFFF"/>
                    <text y="50%" font-size="14" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI" fill="#000000">
                        <tspan x="27%">•</tspan><tspan x="34%">ᴗ</tspan><tspan x="41%">•</tspan>
                        <tspan x="49%"> </tspan><tspan x="54%">/</tspan><tspan x="60%"> </tspan>
                        <tspan x="65%">•</tspan><tspan x="72%">ᴗ</tspan><tspan x="79%">•</tspan>
                    </text></svg>`
            },
            {
                name: "kuma",
                svg: `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150">
                    <rect width="100%" height="100%" fill="#9B6A4D"/>
                    <text y="50%" font-size="16" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI" fill="#000000">
                        <tspan x="43%">•</tspan><tspan x="50%">ᴥ</tspan><tspan x="57%">•</tspan>
                    </text></svg>`
            },
            {
                name: "uniko",
                svg: `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150">
                    <rect width="100%" height="100%" fill="#FFFFFF"/>
                    <text y="50%" font-size="16" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI" fill="#000000">
                        <tspan x="43%">•</tspan><tspan x="50%">ᴗ</tspan><tspan x="57%">•</tspan>
                    </text></svg>`
            },
            {
                name: "alien",
                svg: `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150">
                    <rect width="100%" height="100%" fill="#9DFFA2"/>
                    <text y="50%" font-size="16" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI" fill="#000000">
                        <tspan x="35%">⟁</tspan><tspan x="43%">⬤</tspan><tspan x="50%">ᴗ</tspan><tspan x="57%">⬤</tspan><tspan x="65%">⟁</tspan>
                    </text></svg>`
            },
            {
                name: "mochi",
                svg: `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150">
                    <defs>
                        <linearGradient id="mochiGradient" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#FFFFFF"/>
                            <stop offset="100%" stop-color="#FFB6F9"/>
                        </linearGradient>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#mochiGradient)"/>
                    <text y="50%" font-size="14" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI" fill="#FA85CB">
                        <tspan x="33%">(</tspan><tspan x="38%">•</tspan><tspan x="43%">ᴗ</tspan><tspan x="48%">•</tspan><tspan x="53%">)</tspan>
                    </text></svg>`
            }
        ];

        // Trait arrays
        const eyes = "•⚆⚈⨀⦿⤬◒◓◕∸-■⊡◨∩⬗⋒";
        const mouths = "ᴗ⤻―﹏⩊ω⟀~⩌︿3.ᆺᴥʌ⎦";
        const cheeks = ["^ ^", "> <", "– –", "= =", "⬤ ⬤", "~ ~", "≈ ≈", "≋ ≋", "⁕ ⁕", "∙ ∙", "∘ ∘"];
        const accessories = "♫✿★✧☾↑♥";
        const backgroundColors = ["#1A1A1A", "#FFFFFF", "#B29BE1", "#F9BFF2", "#FEAFAF", "#F9CC1F", "#BAE99C", "#99E2FF"];
        const faceColors = ["#000000", "#EAEAE8", "#9774CE", "#FA85CB", "#EA434A", "#F98D70", "#57A52B", "#6B97FF"];

        // Generate rainbow SVG
        function generateRainbowSVG(eye, mouth, leftCheek, rightCheek, accessory, faceColor) {
            const gradientId = 'rainbow' + Math.floor(Math.random() * 10000);
            return `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150">
                <defs>
                    <linearGradient id="${gradientId}" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#B29AE1"/>
                        <stop offset="20%" stop-color="#F8BEF1"/>
                        <stop offset="40%" stop-color="#FDAFAE"/>
                        <stop offset="60%" stop-color="#F8CC1F"/>
                        <stop offset="80%" stop-color="#B9E99C"/>
                        <stop offset="100%" stop-color="#99E1FF"/>
                    </linearGradient>
                </defs>
                <rect width="100%" height="100%" fill="url(#${gradientId})"/>
                <text y="50%" font-size="16" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI" fill="${faceColor}">
                    <tspan x="35%">${leftCheek}</tspan>
                    <tspan x="43%">${eye}</tspan>
                    <tspan x="50%">${mouth}</tspan>
                    <tspan x="57%">${eye}</tspan>
                    <tspan x="65%">${rightCheek}</tspan>
                    <tspan x="72%">${accessory}</tspan>
                </text>
            </svg>`;
        }

        // Generate regular SVG
        function generateRegularSVG(eye, mouth, leftCheek, rightCheek, accessory, bgColor, faceColor) {
            return `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150">
                <rect width="100%" height="100%" fill="${bgColor}"/>
                <text y="50%" font-size="16" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI" fill="${faceColor}">
                    <tspan x="35%">${leftCheek}</tspan>
                    <tspan x="43%">${eye}</tspan>
                    <tspan x="50%">${mouth}</tspan>
                    <tspan x="57%">${eye}</tspan>
                    <tspan x="65%">${rightCheek}</tspan>
                    <tspan x="72%">${accessory}</tspan>
                </text>
            </svg>`;
        }

        // Random selection helper
        function random(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function randomChar(str) {
            return str[Math.floor(Math.random() * str.length)];
        }

        // Create NFT card
        function createNFTCard(svg, title, type, isUltraRare = false, isRainbow = false) {
            const card = document.createElement('div');
            card.className = `nft-card ${isUltraRare ? 'ultra-rare' : ''} ${isRainbow ? 'rainbow' : ''}`;
            card.innerHTML = `
                <div class="nft-svg">${svg}</div>
                <div class="nft-title">${title}</div>
                <div class="nft-type">${type}</div>
            `;
            return card;
        }

        // Generate and display NFTs
        function generateNFTs() {
            const ultraRareContainer = document.getElementById('ultra-rares');
            const rainbowContainer = document.getElementById('rainbow-nfts');
            const randomContainer = document.getElementById('random-nfts');

            // 1. Generate all 10 ultra rares
            ultraRares.forEach((ultraRare, index) => {
                const card = createNFTCard(
                    ultraRare.svg,
                    `Unikō #${index + 1}`,
                    `Ultra Rare - ${ultraRare.name}`,
                    true
                );
                ultraRareContainer.appendChild(card);
            });

            // 2. Generate 5 rainbow background NFTs
            for (let i = 0; i < 5; i++) {
                const eye = randomChar(eyes);
                const mouth = Math.random() < 0.5 ? randomChar(mouths) : '';
                const cheek = Math.random() < 0.5 ? random(cheeks).split(' ') : ['', ''];
                const accessory = Math.random() < 0.5 ? randomChar(accessories) : '';
                const faceColor = random(faceColors);

                const svg = generateRainbowSVG(eye, mouth, cheek[0] || '', cheek[1] || '', accessory, faceColor);
                const card = createNFTCard(
                    svg,
                    `Unikō #${11 + i}`,
                    'Rainbow Background',
                    false,
                    true
                );
                rainbowContainer.appendChild(card);
            }

            // 3. Generate 5 random regular NFTs
            for (let i = 0; i < 5; i++) {
                const eye = randomChar(eyes);
                const mouth = Math.random() < 0.5 ? randomChar(mouths) : '';
                const cheek = Math.random() < 0.5 ? random(cheeks).split(' ') : ['', ''];
                const accessory = Math.random() < 0.5 ? randomChar(accessories) : '';
                const bgColor = random(backgroundColors);
                const faceColor = random(faceColors);

                const svg = generateRegularSVG(eye, mouth, cheek[0] || '', cheek[1] || '', accessory, bgColor, faceColor);
                const card = createNFTCard(
                    svg,
                    `Unikō #${16 + i}`,
                    'Regular'
                );
                randomContainer.appendChild(card);
            }
        }

        // Generate NFTs on page load
        generateNFTs();
    </script>
</body>
</html>
