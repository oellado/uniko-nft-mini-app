    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1, h2 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px;
        }
        .nft-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .nft-card:hover {
            transform: translateY(-5px);
        }
        .nft-preview {
            width: 250px;
            height: 250px;
            margin: 0 auto 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }
        .nft-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        .nft-details {
            font-size: 0.9em;
            color: #666;
            text-align: center;
        }
        .rarity {
            display: inline-block;
            background: #ffd700;
            color: #000;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-top: 10px;
        }
        .regular-rarity {
            background: #e0e0e0;
        }
        .section {
            margin-bottom: 60px;
        }
    </style>

                    <defs>
                        <linearGradient id="mochiGradient" x1="0" y1="0" x2="0" y2="1">

                    </defs>
                    <rect width="100%" height="100%" fill="url(#mochiGradient)"/>
                    <text y="50%" font-size="18" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI" fill="#FA85CB">
                        <tspan x="33%">(</tspan><tspan x="38%">‚Ä¢</tspan><tspan x="43%">·¥ó</tspan><tspan x="48%">‚Ä¢</tspan><tspan x="53%">)</tspan>
                    </text></svg>`,
                bgColor: "gradient white to #FFB6F9",
                faceColor: "#FA85CB"

        ];

        // Regular trait definitions
        const eyeTraits = "‚Ä¢‚öÜ‚öà‚®Ä‚¶ø‚§¨‚óí‚óì‚óï‚à∏-‚ñÝ‚ä°‚ó®‚à©‚¨ó‚ãí";
        const mouthTraits = "·¥ó‚§ª‚ÄïÔπè‚©äœâ‚üÄ~‚©åÔ∏ø3.·Ü∫·¥• å‚é¶";
        const cheekTraits = ["^ ^", "> <", "‚Äì ‚Äì", "= =", "‚¨§ ‚¨§", "~ ~", "‚âà ‚âà", "‚âã ‚âã", "‚Åï ‚Åï", "‚àô ‚àô", "‚àò ‚àò"];
        const accessoryTraits = "‚ô´‚úø‚òÖ‚úß‚òæ‚Üë‚ô•";
        const backgroundColors = ["#1A1A1A", "#FFFFFF", "#B29BE1", "#F9BFF2", "#FEAFAF", "#F9CC1F", "#BAE99C", "#99E2FF"];
        const faceColors = ["#000000", "#EAEAE8", "#9774CE", "#FA85CB", "#EA434A", "#F98D70", "#57A52B", "#6B97FF"];

        function generateRegularNFT(seed) {
            // Create a more complex hash using multiple sources of randomness
            const timestamp = Date.now();
            const randomOffset = Math.floor(Math.random() * 1000000);
            const complexHash = Array.from(seed + timestamp + randomOffset).reduce((acc, char) => {
                return acc + char.charCodeAt(0) + (acc << 5) - acc;
            }, 0);
            
            // Use different parts of the complex hash for different traits
            // Increase chance of new eye traits (‚¨ó and ‚ãí) by using modulo 13 instead of length
            // This makes the last two traits (‚¨ó and ‚ãí) appear more often
            const eyeIndex = Math.abs(complexHash) % 13; // Changed from eyeTraits.length to 13
            const mouthIndex = Math.abs(complexHash >> 8) % mouthTraits.length;
            const cheekIndex = Math.abs(complexHash >> 16) % cheekTraits.length;
            const accessoryIndex = Math.abs(complexHash >> 24) % accessoryTraits.length;
            const bgColorIndex = Math.abs(complexHash >> 4) % backgroundColors.length;
            const faceColorIndex = Math.abs(complexHash >> 12) % faceColors.length;
            
            // Use a different part of the hash for rainbow chance
            const rainbowChance = Math.abs(complexHash >> 20) % 100;
            const useRainbow = rainbowChance < 1; // 1% chance for rainbow

            // Ensure we don't get the same eye and mouth combination too often
            const eye = eyeTraits[eyeIndex];
            const mouth = mouthTraits[mouthIndex];
            const cheeks = cheekTraits[cheekIndex].split(" ");
            const accessory = accessoryTraits[accessoryIndex];
            
            // Ensure background and face colors are different
            let bgColor = useRainbow ? "url(#rainbowGradient)" : backgroundColors[bgColorIndex];
            let faceColor = faceColors[faceColorIndex];
            
            // If not rainbow, ensure background and face colors are different
            if (!useRainbow && bgColor === faceColor) {
                faceColor = faceColors[(faceColorIndex + 1) % faceColors.length];
            }

            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250">
                ${useRainbow ? `
                <defs>
                    <linearGradient id="rainbowGradient" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#B29AE1"/>
                        <stop offset="20%" stop-color="#F8BEF1"/>
                        <stop offset="40%" stop-color="#FDAFAE"/>
                        <stop offset="60%" stop-color="#F8CC1F"/>
                        <stop offset="80%" stop-color="#B9E99C"/>
                        <stop offset="100%" stop-color="#99E1FF"/>
                    </linearGradient>
                </defs>` : ''}
                <rect width="100%" height="100%" fill="${bgColor}"/>
                <text y="50%" font-size="20" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI" fill="${faceColor}">
                    <tspan x="35%">${cheeks[0]}</tspan>
                    <tspan x="43%">${eye}</tspan>
                    <tspan x="50%">${mouth}</tspan>
                    <tspan x="57%">${eye}</tspan>
                    <tspan x="65%">${cheeks[1]}</tspan>
                    <tspan x="72%">${accessory}</tspan>
                </text>
            </svg>`;

            return {
                name: `UnikoNFT #${seed}`,
                svg,
                bgColor: useRainbow ? "Rainbow Gradient" : bgColor,
                faceColor,
                isRainbow: useRainbow
            };
        }

        // Generate more random seeds
        function generateSeeds() {
            const seeds = new Set(); // Use Set to ensure unique seeds
            while (seeds.size < 20) {
                const timestamp = Date.now();
                const random = Math.floor(Math.random() * 1000000);
                seeds.add(`seed${timestamp}${random}`);
            }
            return Array.from(seeds);
        }

        function displayNFTs() {
            // Display ultra rares
            const ultraRareGrid = document.getElementById('ultraRareGrid');
            ultraRares.forEach((nft, index) => {
                const card = document.createElement('div');
                card.className = 'nft-card';
                card.innerHTML = `
                    <div class="nft-preview">${nft.svg}</div>
                    <div class="nft-name">${nft.name}</div>
                    <div class="nft-details">
                        <div>Background: ${nft.bgColor}</div>
                        <div>Face Color: ${nft.faceColor}</div>
                        <div class="rarity">Ultra Rare (0.01%)</div>
                    </div>
                `;
                ultraRareGrid.appendChild(card);
            });

            // Display regular NFTs with random seeds
            const regularGrid = document.getElementById('regularGrid');
            const seeds = generateSeeds();
            seeds.forEach(seed => {
                const nft = generateRegularNFT(seed);
                const card = document.createElement('div');
                card.className = 'nft-card';
                card.innerHTML = `
                    <div class="nft-preview">${nft.svg}</div>
                    <div class="nft-name">${nft.name}</div>
                    <div class="nft-details">
                        <div>Background: ${nft.bgColor}</div>
                        <div>Face Color: ${nft.faceColor}</div>
                        <div class="rarity ${nft.isRainbow ? '' : 'regular-rarity'}">${nft.isRainbow ? 'Rainbow (1%)' : 'Regular'}</div>
                    </div>
                `;
                regularGrid.appendChild(card);
            });
        }

        displayNFTs();
