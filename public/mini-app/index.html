<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnikoNFT Mini App</title>
    
    <!-- Farcaster Mini App SDK -->
    <script src="https://unpkg.com/@farcaster/frame-sdk@latest/dist/index.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .uniko-character {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            background-size: 400% 400%;
            animation: gradientShift 3s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .mint-button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        
        .mint-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="uniko-character">🦄</div>
            <h1 style="color: #333; margin-bottom: 16px; font-size: 28px;">UnikoNFT</h1>
            <p style="color: #666; margin-bottom: 32px; line-height: 1.6;">
                Mint your unique Uniko companion! Each NFT is 100% on-chain with randomly generated traits.
            </p>
            
            <div style="margin-bottom: 24px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="color: #666;">Price:</span>
                    <span style="color: #333; font-weight: bold;">0.001 ETH</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="color: #666;">Supply:</span>
                    <span style="color: #333; font-weight: bold;">10,000</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: #666;">Network:</span>
                    <span style="color: #333; font-weight: bold;">Base</span>
                </div>
            </div>
            
            <button class="mint-button" onclick="handleMint()">
                Mint Uniko NFT
            </button>
            
            <div id="status" style="margin-top: 16px; color: #666; font-size: 14px;"></div>
        </div>
    </div>

    <script>
        // Initialize Farcaster SDK
        let sdk;
        
        async function initializeFarcaster() {
            try {
                if (window.FrameSDK) {
                    sdk = window.FrameSDK;
                    await sdk.context.ready();
                    console.log('Farcaster SDK initialized');
                    
                    // Get user context
                    const context = await sdk.context.get();
                    console.log('User context:', context);
                    
                    document.getElementById('status').textContent = 'Connected to Farcaster';
                } else {
                    console.log('Farcaster SDK not available, running in standalone mode');
                    document.getElementById('status').textContent = 'Standalone mode';
                }
            } catch (error) {
                console.error('Failed to initialize Farcaster SDK:', error);
                document.getElementById('status').textContent = 'Ready to mint';
            }
        }
        
        async function handleMint() {
            const button = document.querySelector('.mint-button');
            const status = document.getElementById('status');
            
            button.disabled = true;
            button.textContent = 'Minting...';
            status.textContent = 'Preparing transaction...';
            
            try {
                // In a real implementation, you would:
                // 1. Connect to user's wallet
                // 2. Call the smart contract mint function
                // 3. Handle the transaction
                
                // For demo purposes, simulate minting
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                status.textContent = '🎉 Mint successful! Your Uniko NFT has been minted!';
                button.textContent = 'Minted!';
                button.style.background = 'linear-gradient(45deg, #4ecdc4, #44a08d)';
                
                // If in Farcaster, you could close the mini app or show success
                if (sdk) {
                    // sdk.actions.close();
                }
                
            } catch (error) {
                console.error('Mint failed:', error);
                status.textContent = 'Mint failed. Please try again.';
                button.disabled = false;
                button.textContent = 'Mint Uniko NFT';
            }
        }
        
        // Initialize when page loads
        window.addEventListener('load', initializeFarcaster);
    </script>
</body>
</html>
