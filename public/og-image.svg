<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Main Content -->
  <g transform="translate(100, 100)">
    <!-- Title -->
    <text x="500" y="80" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="64" font-weight="bold">
      UnikoNFT
    </text>
    
    <!-- Subtitle -->
    <text x="500" y="140" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif" font-size="32">
      Mint Your Unique Companion
    </text>
    
    <!-- Character Preview -->
    <g transform="translate(400, 180)">
      <!-- Body -->
      <circle cx="100" cy="120" r="80" fill="#FFE4B5" stroke="#DEB887" stroke-width="3"/>
      
      <!-- Eyes -->
      <circle cx="80" cy="100" r="8" fill="#000"/>
      <circle cx="120" cy="100" r="8" fill="#000"/>
      <circle cx="82" cy="98" r="3" fill="#fff"/>
      <circle cx="122" cy="98" r="3" fill="#fff"/>
      
      <!-- Mouth -->
      <path d="M 85 130 Q 100 145 115 130" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
      
      <!-- Cheeks -->
      <circle cx="60" cy="115" r="12" fill="#FFB6C1" opacity="0.6"/>
      <circle cx="140" cy="115" r="12" fill="#FFB6C1" opacity="0.6"/>
    </g>
    
    <!-- Features -->
    <text x="500" y="320" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24">
      ✨ 100% On-Chain ✨ Randomized Traits ✨ Base Network
    </text>
    
    <!-- Price -->
    <text x="500" y="380" text-anchor="middle" fill="#FFD700" font-family="Arial, sans-serif" font-size="36" font-weight="bold">
      0.001 ETH
    </text>
    
    <!-- CTA -->
    <rect x="350" y="420" width="300" height="60" rx="30" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
    <text x="500" y="460" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
      Mint Now
    </text>
  </g>
</svg> 